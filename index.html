<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#07100F">
<title>HealthGuard AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#0B9E8A;--teal2:#12C5AD;--teal3:rgba(11,158,138,0.12);
  --green:#22C55E;--amber:#F59E0B;--red:#EF4444;--purple:#7C3AED;--purple2:#A78BFA;
  --bg:#07100F;--bg2:#0D1A18;--card:#101E1C;--card2:#152421;
  --border:rgba(11,158,138,0.15);--border2:rgba(11,158,138,0.25);
  --text:#E2F0EE;--muted:#5E8E89;--muted2:#8BBDB8;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100dvh;overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--text);}
#app{width:100%;height:100dvh;position:relative;overflow:hidden;background:var(--bg2);}

/* SCREENS */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;transition:opacity 0.35s ease;pointer-events:all;}
.screen.hidden{opacity:0;pointer-events:none;}
.scroll-area{flex:1;overflow-y:auto;scrollbar-width:none;padding-bottom:80px;}
.scroll-area::-webkit-scrollbar{display:none;}

/* CHAT TYPING ANIMATION (Rolling Circles) */
.typing-dots { display: flex; gap: 4px; padding: 10px 15px; background: var(--card); border-radius: 12px; width: fit-content; margin-bottom: 1rem; }
.dot { width: 6px; height: 6px; background: var(--purple2); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
.dot:nth-child(1) { animation-delay: -0.32s; }
.dot:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }

/* LIVE VIDEO STYLES */
#live-video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 16px; margin-bottom: 1rem; position: relative; overflow: hidden; display: none; border: 2px solid var(--purple); }
#live-stream { width: 100%; height: 100%; object-fit: cover; }
.scanner-line { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--purple2); box-shadow: 0 0 15px var(--purple); animation: scan 2s linear infinite; z-index: 5; }
@keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

/* COMMON COMPONENTS */
.top-bar{display:flex;align-items:center;gap:0.75rem;padding:0.85rem 1.1rem;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
.ob-btn{width:100%;padding:0.85rem;background:linear-gradient(135deg,var(--purple),#5b21b6);border:none;border-radius:12px;color:white;font-weight:700;cursor:pointer;margin-top:0.5rem;}
.chat-msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.75rem;}
.msg-user{display:flex;justify-content:flex-end;}
.msg-ai{display:flex;gap:0.5rem;align-items:flex-start;}
.bubble-user{background:var(--purple);border-radius:14px 14px 4px 14px;padding:0.65rem 0.85rem;max-width:80%;font-size:0.85rem;}
.bubble-ai{background:var(--card);border:1px solid var(--border);border-radius:14px 14px 14px 4px;padding:0.65rem 0.85rem;max-width:82%;font-size:0.85rem;}
.chat-bar{padding:0.65rem 0.85rem;border-top:1px solid var(--border);display:flex;gap:0.5rem;background:var(--bg2);}
.chat-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.6rem;color:white;outline:none;}
.panel { position: fixed; inset: 0; background: var(--bg2); z-index: 100; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
.panel.open { transform: translateY(0); }
</style>
</head>
<body>

<div id="app">
    <div class="screen" id="s-chat">
        <div class="top-bar">
            <div style="font-size:1.2rem;">🛡️</div>
            <div style="flex:1; font-weight:700;">HealthGuard AI</div>
            <button onclick="openPanel('liveAIPanel')" style="background:var(--purple); border:none; color:white; padding:5px 12px; border-radius:8px; font-size:0.7rem;">LIVE VISION</button>
        </div>
        <div class="chat-msgs" id="chatMsgs">
            <div class="msg-ai">
                <div class="bubble-ai">Hello! I am your HealthGuard AI. How can I help you today?</div>
            </div>
        </div>
        <div class="chat-bar">
            <input type="text" id="chatInput" class="chat-input" placeholder="Ask anything...">
            <button onclick="sendMessage()" style="background:var(--purple); border:none; color:white; width:40px; border-radius:10px;">➔</button>
        </div>
    </div>

    <div id="liveAIPanel" class="panel">
        <div class="top-bar">
            <button onclick="closeLiveAI()" style="background:none; border:none; color:white; font-size:1.5rem;">✕</button>
            <div style="font-weight:700;">Live AI Vision</div>
        </div>
        <div style="padding:1.5rem;">
            <div id="live-video-container">
                <div class="scanner-line"></div>
                <video id="live-stream" autoplay playsinline muted></video>
            </div>
            
            <div id="live-instruction" style="text-align:center; padding: 2rem 0;">
                <div style="font-size:3rem;">👁️</div>
                <h3 style="color:var(--purple2); margin-top:1rem;">AI Vision Mode</h3>
                <p style="color:var(--muted2); font-size:0.8rem;">Show the AI your injury or share your screen for help.</p>
            </div>

            <button onclick="startCapture('camera')" class="ob-btn">📷 Start Camera Scan</button>
            <button onclick="startCapture('screen')" class="ob-btn" style="background:none; border:1px solid var(--purple); margin-top:10px;">📱 Share Screen</button>
            
            <div id="ai-status" style="margin-top:20px; font-family:var(--mono); font-size:0.7rem; color:var(--purple2); text-align:center; display:none;">
                ● AI IS ANALYZING FEED...
            </div>
        </div>
    </div>
</div>

<script>
let currentStream = null;

// --- CHAT LOGIC WITH ROLLING CIRCLES ---
function sendMessage() {
    const input = document.getElementById('chatInput');
    const container = document.getElementById('chatMsgs');
    const text = input.value.trim();
    if (!text) return;

    // Add User Message
    const userDiv = document.createElement('div');
    userDiv.className = 'msg-user';
    userDiv.innerHTML = `<div class="bubble-user">${text}</div>`;
    container.appendChild(userDiv);
    input.value = '';

    // Show Rolling Circles (Thinking)
    const typingId = 'typing-' + Date.now();
    const typingHtml = `
        <div id="${typingId}" class="msg-ai">
            <div class="typing-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>`;
    container.insertAdjacentHTML('beforeend', typingHtml);
    container.scrollTop = container.scrollHeight;

    // AI Response Delay
    setTimeout(() => {
        document.getElementById(typingId).remove();
        const aiDiv = document.createElement('div');
        aiDiv.className = 'msg-ai';
        aiDiv.innerHTML = `<div class="bubble-ai">I've analyzed your request regarding "${text}". Please provide more details so I can assist further.</div>`;
        container.appendChild(aiDiv);
        container.scrollTop = container.scrollHeight;
    }, 2000);
}

// --- LIVE VISION LOGIC ---
async function startCapture(type) {
    const video = document.getElementById('live-stream');
    const container = document.getElementById('live-video-container');
    const instruction = document.getElementById('live-instruction');
    const status = document.getElementById('ai-status');

    try {
        if (type === 'camera') {
            currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        } else {
            currentStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        }
        
        video.srcObject = currentStream;
        container.style.display = 'block';
        instruction.style.display = 'none';
        status.style.display = 'block';

        const speech = new SpeechSynthesisUtterance("I am now connected. I can see your " + type + ".");
        window.speechSynthesis.speak(speech);
    } catch (err) {
        alert("Permission denied or browser not supported.");
    }
}

function openPanel(id) { document.getElementById(id).classList.add('open'); }

function closeLiveAI() {
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
    }
    document.getElementById('liveAIPanel').classList.remove('open');
    document.getElementById('live-video-container').style.display = 'none';
    document.getElementById('live-instruction').style.display = 'block';
    document.getElementById('ai-status').style.display = 'none';
}
</script>

</body>
</html>
